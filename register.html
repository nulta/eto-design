<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="intro.css">
</head>
<body>
    <script>
        // Dim the backdrop on scroll
        // NOTE: animation-timeline을 쓰면 pure-CSS로 구현할 수 있지만, 그건 아직 Firefox에서 먹질 않습니다.
        window.addEventListener('scroll', () => {
            const backdrop = document.querySelector('.backdrop');
            const scrollY = window.scrollY;
            const minScroll = backdrop.clientHeight / 4;
            const maxScroll = backdrop.clientHeight * 4;
            const minOpacity = 0.8;
            const opacity = 
                1.0 - Math.min(Math.max((scrollY - minScroll) / (maxScroll - minScroll), 0), 1.0-minOpacity);

            backdrop.style.opacity = opacity;
        });
    </script>
    <div class="backdrop">
        <div class="star star1"></div>
        <div class="star star2"></div>
        <div class="star star3"></div>
    </div>
    <main>
        <section class="section-full section-hero">
            <img src="assets/placeholder-logo.png" alt="Logo" class="logo-img">
            <p class="server-description">
                <span class="text-weak">welcome to</span>
                eto.example.org
            </p>
            <div class="styled-hr">
                <hr/>
            </div>

            <form class="register-form">
                <label class="col">
                    <small>
                        핸들네임
                    </small>
                    <label class="row">
                        @
                        <input type="text" name="username" placeholder="핸들네임" required autofocus>
                        <span>
                            ::eto.example.org
                        </span>
                    </label>
                </label>
                <label class="col">
                    <small>
                        비밀번호
                    </small>
                    <input type="password" name="password" placeholder="비밀번호" required>
                    <input type="password" name="password" placeholder="비밀번호 확인" required>
                    <small>
                        8자 이상 128자 미만이어야 합니다.
                    </small>
                </label>

                <fieldset class="row">
                    <button type="button" class="outlined" onclick="document.querySelector('#load-identity-dialog').showModal()">
                        기존 아이덴티티 불러오기
                    </button>    
                    <button type="button">
                        새 아이덴티티 생성
                    </button>
                </fieldset>

                <div class="button-group">
                    <button type="button" class="outlined iconed" onclick="location.href='intro.html'">←</button>
                    <div></div>
                    <button type="button" class="iconed" onclick="location.href='intro.html'" disabled>→</button>
                </div>
            </form>
        </section>
        <dialog id="load-identity-dialog" onclick="event.target.close && event.target.close()">
            <!-- DEVELOPER: 여기에 붙은 onclick은 다이얼로그 바깥을 클릭했을 때 닫는 역할만 수행함 -->
            <section>
                <header>
                    <h2>
                        기존 아이덴티티 불러오기
                    </h2>
                </header>
                <form class="identity-dialog-form">
                    <label class="col">
                        <small>
                            아이덴티티 JSON
                        </small>
                        <textarea name="identity-json" placeholder="{...}" required class="mono" rows="6"></textarea>
                    </label>
                    <label class="col">
                        <small>
                            비밀키
                        </small>
                        <input type="password" name="password" placeholder="아이덴티티 비밀키" required class="mono">
                    </label>

                    <div>
                        <button class="outlined" onclick="event.target.closest('dialog').close()">
                            취소
                        </button>
                        <button>
                            불러오기
                        </button>
                    </div>
                </form>
            </section>
        </dialog>
    </main>
</body>
</html>
